<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="medoraGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#medoraGradient)" filter="url(#softShadow)"/>

  <!-- Subtle inner highlight -->
  <rect x="16" y="16" width="480" height="240" rx="120" fill="#ffffff" opacity="0.06"/>

  <!-- Heart with integrated pulse line -->
  <g fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <path d="
      M 256 372
      C 180 316, 118 268, 118 202
      C 118 158, 152 128, 192 128
      C 218 128, 240 141, 256 163
      C 272 141, 294 128, 320 128
      C 360 128, 394 158, 394 202
      C 394 220, 388 236, 378 251
      L 330 251
      L 308 205
      L 276 285
      L 250 233
      L 236 251
      L 150 251
    "/>
  </g>

  <!-- Filled heart lobes for solidity (behind pulse for contrast) -->
  <path d="
    M 256 372
    C 180 316, 118 268, 118 202
    C 118 158, 152 128, 192 128
    C 218 128, 240 141, 256 163
    C 272 141, 294 128, 320 128
    C 360 128, 394 158, 394 202
    C 394 268, 332 316, 256 372
    Z"
    fill="#ffffff" opacity="0.14"/>

  <!-- Crisp pulse line on top -->
  <polyline
    points="150,251 236,251 250,233 276,285 308,205 330,251 378,251"
    fill="none"
    stroke="#ffffff"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
